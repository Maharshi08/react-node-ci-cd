services:
  mongo-dev:
    image: mongo:6
    ports:
      - "${DEV_MONGO_PORT:-37017}:27017"
    networks:
      - app-network
    restart: unless-stopped

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env.dev
    ports:
      - "${DEV_BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - mongo-dev
    command: npm run dev
    networks:
      - app-network
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env.dev
    environment:
      - PORT=3000
      - API_PROXY_TARGET=http://backend-dev:5000
    ports:
      - "${DEV_FRONTEND_PORT:-8082}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-dev
    command: npm start
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend_node_modules:
  frontend_node_modules:
