services:
  mongo-prod:
    image: mongo:6
    networks:
      - app-network
    restart: unless-stopped

  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env.prod
    ports:
      - "5001:5000"
    depends_on:
      - mongo-prod
    networks:
      - app-network
    restart: unless-stopped

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend-prod
    networks:
      - app-network
    restart: unless-stopped

  nginx-prod:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-prod
      - backend-prod
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
